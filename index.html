<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FREAKSHOW ARENA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
const characters = [
  {id:1, name:"Donald Trump", tag:"MAKE CHAT GREAT AGAIN", img:"https://picsum.photos/id/64/400/400", votes:12847},
  {id:2, name:"Shrek", tag:"GET OUT OF MY SWAMP", img:"https://picsum.photos/id/201/400/400", votes:8942},
  {id:3, name:"Yoda", tag:"HMM, CHAT YOU MUST", img:"https://picsum.photos/id/29/400/400", votes:6731},
  {id:4, name:"Karen", tag:"I WANT TO SPEAK TO THE MANAGER", img:"https://picsum.photos/id/160/400/400", votes:5210},
  {id:5, name:"Borat", tag:"VERY NICE!", img:"https://picsum.photos/id/201/400/400", votes:4123},
  {id:6, name:"Vladimir Putin", tag:"IN RUSSIA CHAT CONTROLS YOU", img:"https://picsum.photos/id/160/400/400", votes:3890}
];

function render() {
  document.getElementById("grid").innerHTML = characters.map(c => `<div onclick="alert('Clicked ' + c.name)" class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer border-4 border-lime-400 hover:scale-105"><img src="\( {c.img}" class="w-full h-48 object-cover"><div class="p-4 text-center"><div class="font-black text-2xl text-orange-400"> \){c.name}</div><div class="text-lime-400 text-sm">\( {c.tag}</div><div class="text-4xl font-black"> \){c.votes}</div></div></div>`).join('');
}

document.addEventListener("DOMContentLoaded", () => {
  alert("✅ JS WORKS — Tap any card");
  render();
});
</script>
<style>
body { background:#000; color:lime; }
h1 { font-size:50px; color:orange; text-shadow:0 0 20px orange; }
</style>
</head>
<body class="p-8 text-center">
<h1>FREAKSHOW ARENA</h1>
<p class="text-3xl mt-4">Coins: <span class="text-yellow-400">150</span></p>
<div id="grid" class="grid grid-cols-2 gap-6 max-w-2xl mx-auto mt-10"></div>
</body>
</html>
