function render() {
  var html = "";
  for (var i = 0; i < characters.length; i++) {
    var c = characters[i];
    html += '<div onclick="openModal(' + c.id + ')" onmouseover="speak(\'' + c.voice.replace(/'/g, "\\'") + '\')" class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer border-4 border-lime-400 hover:scale-105">';
    html += '<img src="' + c.img + '" class="w-full h-48 object-cover">';
    html += '<div class="p-4 text-center">';
    html += '<div class="font-black text-2xl text-orange-400">' + c.name + '</div>';
    html += '<div class="text-lime-400 text-sm">' + c.tag + '</div>';
    html += '<div class="text-4xl font-black">' + c.votes + '</div>';
    html += '</div></div>';
  }
  document.getElementById("grid").innerHTML = html;
}

function speak(text) {
  var utterance = new SpeechSynthesisUtterance(text);
  if (text.includes("TREMENDOUS")) { utterance.rate = 0.9; utterance.pitch = 1.1; }
  speechSynthesis.speak(utterance);
}

function openModal(id) {
  var c = characters.find(x => x.id === id);
  document.getElementById("modal-name").textContent = c.name;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.addEventListener("DOMContentLoaded", function() {
  alert("✅ JS WORKS — 30 cards loaded! Long-press for voice, tap for chat");
  render();
});
</script>
<style>

</style>
</head>

  <div class="bg-zinc-900 p-8 rounded-3xl max-w-md text-left">
    <h2 id="modal-name" class="text-3xl text-orange-400 mb-4"></h2>

    <button onclick="sendChat()" class="mt-4 bg-lime-400 text-black px-8 py-3 rounded-xl font-bold">SEND</button>
    <button onclick="closeModal()" class="mt-4 ml-4 text-lime-400">Close</button>
  </div>
</div>
</body>
