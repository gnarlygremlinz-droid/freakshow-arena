<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FREAKSHOW ARENA — 3 Day Meme War</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
const characters = [
  {id:1, name:"Donald Trump", tag:"MAKE CHAT GREAT AGAIN", img:"https://picsum.photos/id/64/400/400", votes:12847, tooltip:"TREMENDOUS! Believe me!"},
  {id:2, name:"Shrek", tag:"GET OUT OF MY SWAMP", img:"https://picsum.photos/id/201/400/400", votes:8942, tooltip:"Get out of my swamp!"},
  {id:3, name:"Yoda", tag:"HMM, CHAT YOU MUST", img:"https://picsum.photos/id/29/400/400", votes:6731, tooltip:"Hmm... strong with this question the force is."},
  {id:4, name:"Karen", tag:"I WANT TO SPEAK TO THE MANAGER", img:"https://picsum.photos/id/160/400/400", votes:5210, tooltip:"I am THE MANAGER!"},
  {id:5, name:"Borat", tag:"VERY NICE!", img:"https://picsum.photos/id/201/400/400", votes:4123, tooltip:"Very nice! High five!"},
  {id:6, name:"Vladimir Putin", tag:"IN RUSSIA CHAT CONTROLS YOU", img:"https://picsum.photos/id/160/400/400", votes:3890, tooltip:"Very interesting..."}
];

let coins = 150;

function init() {
  render();
}

function render() {
  document.getElementById('coins').textContent = coins;
  document.getElementById('grid').innerHTML = characters.map(c => `
    <div onclick="openModal(\( {c.id})" onmouseover="playHoverVoice( \){JSON.stringify(c)})" class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer hover:scale-105 transition border-4 border-lime-400 relative group">
      <img src="${c.img}" class="w-full h-48 object-cover">
      <div class="p-4 text-center">
        <div class="font-black text-2xl text-orange-400">${c.name}</div>
        <div class="text-lime-400 text-sm">${c.tag}</div>
        <div class="text-4xl font-black">${c.votes}</div>
      </div>
    </div>
  `).join('');
}

function playHoverVoice(char) {
  const utterance = new SpeechSynthesisUtterance(char.tooltip);
  utterance.rate = char.name.includes("Trump") ? 0.9 : 1;
  utterance.pitch = char.name.includes("Trump") ? 1.1 : 1;
  speechSynthesis.speak(utterance);
}

function openModal(id) {
  const char = characters.find(c => c.id === id);
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-name').textContent = char.name;
  document.getElementById('modal-tag').textContent = char.tag;
}

function sendChat() {
  const text = document.getElementById('chat-input').value.trim();
  if (!text) return;
  const msg = document.createElement('div'); msg.className = 'flex justify-end';
  msg.innerHTML = `<div class="bg-blue-600 px-5 py-3 rounded-3xl">${text}</div>`;
  document.getElementById('messages').appendChild(msg);
  setTimeout(() => {
    const reply = char.name.includes('Trump') ? "TREMENDOUS! Believe me!" : char.name.includes('Shrek') ? "Get out of my swamp!" : "Interesting...";
    const ai = document.createElement('div'); ai.className = 'flex justify-start';
    ai.innerHTML = `<div class="bg-orange-500 px-5 py-3 rounded-3xl">${reply}</div>`;
    document.getElementById('messages').appendChild(ai);
    playHoverVoice({tooltip: reply, name: char.name});
    document.getElementById('messages').scrollTop = 999999;
  }, 600);
  document.getElementById('chat-input').value = '';
}

function buyCoins() {
  window.open('https://paypal.me/ALPHAPROJECTZ', '_blank');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', init);
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body { font-family: 'Press Start 2P', system-ui; background: #000; }
.glitch { animation: glitch 0.4s infinite; }
@keyframes glitch { 0%,100%{transform:translate(0)} 20%{transform:translate(-3px,3px)} 40%{transform:translate(3px,-3px)} }
.neon { text-shadow: 0 0 15px #22ff88, 0 0 30px #22ff88; }
</style>
</head>
<body class="bg-black text-lime-400 min-h-screen">

<nav class="sticky top-0 bg-zinc-950 border-b-4 border-lime-500 p-4 flex justify-between items-center z-50">
  <div class="text-4xl font-black neon tracking-widest">FREAKSHOW ARENA</div>
  <div id="timer" class="font-mono text-xl text-orange-400">DAY 1 OF 3 • 23:59:59</div>
  <div class="flex items-center gap-3 text-xl">🪙 <span id="coins" class="font-bold">150</span></div>
</nav>

<header class="relative h-[420px] bg-gradient-to-b from-purple-950 to-black flex items-center justify-center overflow-hidden border-b-8 border-orange-500">
  <img src="https://picsum.photos/id/64/600/400" class="w-96 border-8 border-orange-500 rounded-3xl glitch shadow-2xl" alt="FREAKSHOW CHAMPION">
  <div class="text-center z-10">
    <div class="text-6xl font-black neon text-orange-400 tracking-widest glitch">FREAKSHOW ARENA</div>
    <div id="champion-name" class="text-5xl font-black neon text-lime-400 mt-4">CYCLE WINNER 🏆 TRUMP</div>
    <button onclick="buyCoins()" class="mt-6 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-2xl px-14 py-5 rounded-3xl">BUY CHAOS COINS</button>
  </div>
</header>

<div class="max-w-7xl mx-auto p-8">
  <h2 class="text-4xl font-black mb-8 text-center neon">THE CHALLENGERS — 3 DAY WAR</h2>
  <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[999]">
  <div class="bg-zinc-900 w-full max-w-xl rounded-3xl overflow-hidden">
    <div class="p-5 border-b flex items-center gap-4 bg-zinc-950">
      <div>
        <div id="modal-name" class="text-3xl font-black"></div>
        <div id="modal-tag" class="text-lime-400"></div>
      </div>
      <button onclick="closeModal()" class="ml-auto text-5xl">×</button>
    </div>
    <div id="messages" class="h-80 p-6 overflow-y-auto space-y-4 bg-black"></div>
    <div class="p-4 border-t bg-zinc-950 flex gap-3">
      <input id="chat-input" placeholder="Type or speak..." class="flex-1 bg-zinc-800 px-6 py-4 rounded-3xl text-white">
      <button onclick="sendChat()" class="bg-lime-400 text-black px-10 rounded-3xl font-bold">SEND</button>
    </div>
  </div>
</div>

</body>
</html>
