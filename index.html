<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://dqbyxilgywvakdvykxhm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxYnl4aWxneXd2YWtkdnlreGhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODgyMjQsImV4cCI6MjA4OTc2NDIyNH0.41qb21_ixmgnZTw92cJWR4j74S5l_VB9zgT9XLFJOMk';
const PAYPAL_LINK = 'https://paypal.me/ALPHAPROJECTZ';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

let user = null, coins = 150, characters = [], currentChar = null, cycleEndTime = null;

async function init() {
  const { data: { user: u } } = await supabase.auth.getUser();
  user = u || (await supabase.auth.signInAnonymously()).data.user;
  await supabase.rpc('check_and_purge');
  const { data: p } = await supabase.from('profiles').select('coins').eq('id', user.id).single();
  if (p) coins = p.coins;
  const { data: sett } = await supabase.from('settings').select('value').eq('key','cycle_end_time').single();
  cycleEndTime = new Date(sett.value);
  const { data: c } = await supabase.from('characters').select('*').order('votes', { ascending: false });
  characters = c;
  render();
  startTimer();
}

function getCurrentDay() {
  const totalMs = cycleEndTime - Date.now();
  const daysLeft = Math.ceil(totalMs / (24*60*60*1000));
  return 4 - daysLeft;
}

function startTimer() {
  setInterval(() => {
    const remaining = Math.max(0, Math.floor((cycleEndTime - Date.now()) / 1000));
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    const day = getCurrentDay();
    const dayText = day === 3 ? 'FINAL DAY' : `DAY ${day} OF 3`;
    document.getElementById('timer').innerHTML = `${dayText} • \( {h.toString().padStart(2,'0')}: \){m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 0) init();
  }, 1000);
}

function render() {
  document.getElementById('coins').textContent = coins;
  const champion = characters[0] ? characters[0].name : 'TRUMP';
  document.getElementById('champion-name').textContent = `CYCLE WINNER 🏆 ${champion}`;
  document.getElementById('grid').innerHTML = characters.map(c => `
    <div onclick="openModal(\( {c.id})" onmouseover="playHoverVoice( \){JSON.stringify(c)})" class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer hover:scale-105 transition border-4 border-lime-400 relative group">
      <img src="${c.img}" class="w-full h-48 object-cover">
      <div class="p-4 text-center">
        <div class="font-black text-2xl text-orange-400">${c.name}</div>
        <div class="text-lime-400 text-sm">${c.tag}</div>
        <div class="text-4xl font-black">${c.votes}</div>
      </div>
    </div>
  `).join('');
}

function playHoverVoice(char) {
  const utterance = new SpeechSynthesisUtterance(char.tooltip || "Chaos awaits...");
  utterance.rate = char.name.includes("Trump") ? 0.9 : 1;
  utterance.pitch = char.name.includes("Trump") ? 1.1 : 1;
  speechSynthesis.speak(utterance);
}

async function openModal(id) {
  currentChar = characters.find(c => c.id === id);
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-name').textContent = currentChar.name;
  document.getElementById('modal-tag').textContent = currentChar.tag;
  document.getElementById('messages').innerHTML = '<div class="text-center text-gray-400">Type or speak to me!</div>';
}

function sendChat() {
  const text = document.getElementById('chat-input').value.trim();
  if (!text) return;
  const msg = document.createElement('div'); msg.className = 'flex justify-end';
  msg.innerHTML = `<div class="bg-blue-600 px-5 py-3 rounded-3xl">${text}</div>`;
  document.getElementById('messages').appendChild(msg);
  setTimeout(() => {
    const reply = currentChar.name.includes('Trump') ? "TREMENDOUS! Believe me!" : currentChar.name.includes('Shrek') ? "Get out of my swamp!" : "Interesting...";
    const ai = document.createElement('div'); ai.className = 'flex justify-start';
    ai.innerHTML = `<div class="bg-orange-500 px-5 py-3 rounded-3xl">${reply}</div>`;
    document.getElementById('messages').appendChild(ai);
    playHoverVoice({tooltip: reply, name: currentChar.name});
    document.getElementById('messages').scrollTop = 999999;
  }, 600);
  document.getElementById('chat-input').value = '';
}

function showLaunchOffer() {
  if (localStorage.getItem('launchOfferSeen')) return;
  alert("🚀 LAUNCH SPECIAL!\n\n300 Chaos Coins + 1 FREE submission credit for only $1.99\n\nClose this to never see it again");
  localStorage.setItem('launchOfferSeen', 'true');
}

function buyCoins() { window.open(PAYPAL_LINK, '_blank'); }

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

document.addEventListener('DOMContentLoaded', init);
</script>
